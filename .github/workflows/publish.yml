name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., pi-vault-client-v0.2.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Validate release-please component metadata
        run: node ./scripts/release-components.mjs validate

      - name: Run release component tests
        run: node --test ./scripts/release-components.test.mjs

      - name: Resolve release tag to component
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          node ./scripts/release-components.mjs resolve-tag "$RELEASE_TAG" --env >> "$GITHUB_ENV"
          if [[ "$RELEASE_PACKAGE_VERSION" != "$RELEASE_TAG_VERSION" ]]; then
            echo "Resolved package version ($RELEASE_PACKAGE_VERSION) does not match release tag version ($RELEASE_TAG_VERSION)." >&2
            exit 1
          fi

      - name: Install package dependencies
        working-directory: ${{ env.RELEASE_PACKAGE_PATH }}
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --package-lock-only --ignore-scripts
            npm ci
          fi

      - name: Run package quality gate
        working-directory: ${{ env.RELEASE_PACKAGE_PATH }}
        run: npm run check

      - name: Run package release checks (artifact-only)
        working-directory: ${{ env.RELEASE_PACKAGE_PATH }}
        run: npm run release:check:quick

      - name: Publish to npm (OIDC + provenance)
        working-directory: ${{ env.RELEASE_PACKAGE_PATH }}
        run: npm publish --provenance --access public --tag "$RELEASE_NPM_DIST_TAG"
